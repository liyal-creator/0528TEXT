<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>产品适用指南</title>
<style>
  :root{
    --primary:#44D564;
    --primary-light:#E8F3FF;
    --success:#00B42A;
    --warning:#FF7D00;
    --danger:#F53F3F;
    --text-primary:#1D2129;
    --text-secondary:#4E5969;
    --text-tertiary:#86909C;
    --border:#C9CDD4;
    --bg-page:#F2F3F5;
    --bg-white:#FFFFFF;
    --text-inverse:#FFFFFF;
    --shadow-navbar:0 1px 4px rgba(0,0,0,0.05);
    --shadow-card:0 2px 8px rgba(0,0,0,0.06);
    --font-h1:24px;
    --font-h2:20px;
    --font-h3:18px;
    --font-body:16px;
    --font-caption:14px;
    --font-small:12px;
    --space-4:4px;
    --space-8:8px;
    --space-16:16px;
    --space-24:24px;
    --space-32:32px;
  }
  body[data-theme="dark"]{
    --text-primary:#FFFFFF;
    --text-secondary:#C9CDD4;
    --text-tertiary:#86909C;
    --border:#4E5969;
    --bg-page:#111318;
    --bg-white:#1D2129;
    --text-inverse:#FFFFFF;
    --shadow-navbar:0 1px 4px rgba(0,0,0,0.18);
    --shadow-card:0 2px 8px rgba(0,0,0,0.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;background:var(--bg-page);color:var(--text-primary)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
    font-size:var(--font-body);
    line-height:24px;
  }
  input,textarea{user-select:text;-webkit-user-select:text;-webkit-touch-callout:default}
  button{font:inherit}
  .page-guide{min-height:100vh;background:var(--bg-page)}
  .component-navbar{height:44px;background:var(--bg-white);box-shadow:var(--shadow-navbar);display:flex;align-items:center;justify-content:center;padding:0 var(--space-16);position:sticky;top:0;z-index:2}
  .component-navbar-title{font-size:17px;line-height:24px;font-weight:600;color:var(--text-primary);margin:0}
  .section-content{max-width:375px;margin:0 auto;padding:var(--space-16)}
  .component-title{font-size:var(--font-h2);line-height:28px;font-weight:600;margin:0 0 var(--space-16);color:var(--text-primary)}
  .card-default{background:var(--bg-white);border-radius:12px;padding:12px;box-shadow:var(--shadow-card);margin-bottom:var(--space-16)}
  .component-step-head{display:flex;gap:var(--space-8);align-items:flex-start}
  .element-step-num{width:24px;height:24px;border-radius:12px;background:var(--primary);color:var(--text-inverse);display:flex;align-items:center;justify-content:center;font-size:var(--font-small);line-height:16px;font-weight:600;flex:0 0 24px}
  .element-step-title{font-size:var(--font-h3);line-height:24px;font-weight:500;margin:0;color:var(--text-primary)}
  .element-step-text{font-size:var(--font-caption);line-height:20px;font-weight:400;color:var(--text-secondary);margin:var(--space-8) 0 0}
  .component-module-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-16);margin-top:var(--space-16)}
  .component-module-card{background:var(--bg-page);border-radius:12px;padding:12px;min-height:88px}
  .element-module-title{font-size:var(--font-caption);line-height:20px;font-weight:500;color:var(--text-primary);margin:0}
  .element-module-text{font-size:var(--font-caption);line-height:20px;font-weight:400;color:var(--text-tertiary);margin:var(--space-4) 0 0}
  .component-list{margin-top:var(--space-16);background:var(--bg-white)}
  .component-list-item{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--space-8);background:var(--bg-white)}
  .component-list-item:last-child{border-bottom:0}
  .element-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex:0 0 40px}
  .element-icon svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .element-list-main{flex:1;min-width:0}
  .element-list-title{font-size:var(--font-body);line-height:24px;font-weight:400;color:var(--text-primary);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .element-list-subtitle{font-size:var(--font-caption);line-height:20px;font-weight:400;color:var(--text-tertiary);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .element-list-arrow{font-size:var(--font-body);line-height:24px;color:var(--text-tertiary);margin-left:var(--space-8)}
  .component-recommend-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-16);margin-top:var(--space-16)}
  .component-recommend-card{background:var(--bg-white);border-radius:12px;padding:12px;box-shadow:var(--shadow-card);min-height:120px}
  .element-recommend-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
  .element-recommend-icon svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .element-recommend-title{font-size:var(--font-caption);line-height:20px;font-weight:500;color:var(--text-primary);margin:var(--space-8) 0 0}
  .element-recommend-text{font-size:var(--font-caption);line-height:20px;font-weight:400;color:var(--text-secondary);margin:var(--space-4) 0 0}
  .element-note{font-size:var(--font-caption);line-height:20px;font-weight:400;color:var(--text-tertiary);text-align:center;margin:var(--space-16) 0 0}
  [dir="rtl"] .component-step-head{flex-direction:row-reverse}
  [dir="rtl"] .component-list-item{flex-direction:row-reverse}
  [dir="rtl"] .element-list-arrow{margin-left:0;margin-right:var(--space-8);transform:rotate(180deg)}
  @media (min-width:768px){
    .section-content{max-width:480px;padding:var(--space-24)}
  }

</style>
</head>
<body>
  <div class="page-guide">
    <main class="section-content">
      <h2 class="component-title" data-i18n="changeTitle"></h2>

      <section class="card-default">
        <div class="component-step-head">
          <span class="element-step-num">1</span>
          <div>
            <h3 class="element-step-title" data-i18n="step1Title"></h3>
            <p class="element-step-text" data-i18n="step1Text"></p>
          </div>
        </div>
        <div class="component-module-grid">
          <article class="component-module-card">
            <h4 class="element-module-title" data-i18n="moduleSpotlight"></h4>
            <p class="element-module-text" data-i18n="moduleSpotlightText"></p>
          </article>
          <article class="component-module-card">
            <h4 class="element-module-title" data-i18n="moduleCommunityPicks"></h4>
            <p class="element-module-text" data-i18n="moduleCommunityPicksText"></p>
          </article>
          <article class="component-module-card">
            <h4 class="element-module-title" data-i18n="moduleRanking"></h4>
            <p class="element-module-text" data-i18n="moduleRankingText"></p>
          </article>
          <article class="component-module-card">
            <h4 class="element-module-title" data-i18n="moduleCreatorTimeline"></h4>
            <p class="element-module-text" data-i18n="moduleCreatorTimelineText"></p>
          </article>
        </div>
      </section>

      <section class="card-default">
        <div class="component-step-head">
          <span class="element-step-num">2</span>
          <div>
            <h3 class="element-step-title" data-i18n="step2Title"></h3>
            <p class="element-step-text" data-i18n="step2Text"></p>
          </div>
        </div>
        <div class="component-list" id="areaList"></div>
      </section>

      <section class="card-default">
        <div class="component-step-head">
          <span class="element-step-num">3</span>
          <div>
            <h3 class="element-step-title" data-i18n="step3Title"></h3>
            <p class="element-step-text" data-i18n="step3Text"></p>
          </div>
        </div>
      </section>

      <section class="card-default">
        <div class="component-step-head">
          <span class="element-step-num">4</span>
          <div>
            <h3 class="element-step-title" data-i18n="step4Title"></h3>
            <p class="element-step-text" data-i18n="step4Text"></p>
          </div>
        </div>
        <div class="component-recommend-grid" id="recommendList"></div>
      </section>

      <p class="element-note" data-i18n="note"></p>
    </main>
  </div>

<script>
  const categoryCopy = {

    ru:{project:'Проекты',market:'Рынок',web3_news:'Новости',opportunities:'Возможности',for_you:'Для вас',tech:'Технологии',business:'Бизнес и финансы',news:'Мировые новости',entertainment:'Развлечения',lifestyle:'Образ жизни',ai:'AI',relax:'Отдых'},
    ar:{project:'المشاريع',market:'السوق',web3_news:'الأخبار',opportunities:'الفرص',for_you:'لك',tech:'التقنية',business:'الأعمال والمال',news:'أخبار العالم',entertainment:'الترفيه',lifestyle:'نمط الحياة',ai:'الذكاء الاصطناعي',relax:'استرخاء'}
  };
  const icons = {
    project:'<svg viewBox="0 0 28 28"><rect x="4" y="4" width="20" height="20" rx="6"></rect><path d="M14 7.8 20 11.2v6.8L14 21.2 8 18v-6.8L14 7.8z"></path><path d="M8 11.2 14 14.4l6-3.2M14 14.4v6.8"></path></svg>',

    web3_news:'<svg viewBox="0 0 28 28"><rect x="5" y="4" width="18" height="20" rx="4"></rect><path d="M9 8.5h4.5M9 12h10M9 15.5h10M9 19h7"></path></svg>',
    opportunities:'<svg viewBox="0 0 28 28"><path d="M9 21h10"></path><path d="M11 23h6"></path><path d="M8 12a6 6 0 1 1 12 0c0 3.5-2.2 4.2-2.2 6H10.2C10.2 16.2 8 15.5 8 12z"></path></svg>',

    tech:'<svg viewBox="0 0 28 28"><rect x="8" y="8" width="12" height="12" rx="3"></rect><path d="M11 4v4M17 4v4M11 20v4M17 20v4M4 11h4M4 17h4M20 11h4M20 17h4"></path></svg>',
    business:'<svg viewBox="0 0 28 28"><rect x="5" y="7" width="18" height="16" rx="4"></rect><path d="M9 11h6M9 16h5M18 11h5M18 7v4M21 15h3"></path></svg>',
    news:'<svg viewBox="0 0 28 28"><rect x="5" y="4" width="18" height="20" rx="5"></rect><path d="M14 5v18M6 14h16"></path></svg>',

  };
  const areaOrder = ['project','market','web3_news','opportunities','for_you','tech','business','news','entertainment','lifestyle','ai','relax'];
  const recommendIcons = ['tech','market','entertainment','for_you'];

  function getParams(){return new URLSearchParams(window.location.search)}
  function getTheme(params){
    const theme = (params.get('theme') || '').toLowerCase();
    const isDark = params.get('isDark');
    if(theme === 'dark' || isDark === '1') return 'dark';
    return 'light';
  }
  function getLang(params){
    const rawValue = params.get('language') || params.get('lang');
    if(!rawValue) return 'en';
    const value = rawValue.toLowerCase();
    const zhHansValues = ['zh-hans-raw','zh-cn','zhcn','zhhans','zh-hans'];
    const zhHantValues = ['zh','zh-hant-raw','zh-hant','zhhant','zh-tw','zhtw','zh-hk','zhhk'];
    if(zhHansValues.includes(value)) return 'zhHans';
    if(zhHantValues.includes(value)) return 'zhHant';
    if(value === 'ru') return 'ru';
    if(value === 'ar') return 'ar';
    if(value === 'en') return 'en';
    return 'en';
  }
  function renderIcon(code){return icons[code] || icons.for_you}
  function renderAreas(lang,t){
    const list = document.getElementById('areaList');
    list.innerHTML = areaOrder.map(code => '<div class="component-list-item"><span class="element-icon">' + renderIcon(code) + '</span><div class="element-list-main"><p class="element-list-title">' + categoryCopy[lang][code] + '</p><p class="element-list-subtitle">' + t['areaSub_' + code] + '</p></div><span class="element-list-arrow">›</span></div>').join('');
  }
  function renderRecommends(t){
    const data = [
      ['recTrendTitle','recTrendText','tech'],
      ['recWeb3Title','recWeb3Text','market'],
      ['recLightTitle','recLightText','entertainment'],
      ['recGeneralTitle','recGeneralText','for_you']
    ];
    document.getElementById('recommendList').innerHTML = data.map(item => '<article class="component-recommend-card"><div class="element-recommend-icon">' + renderIcon(item[2]) + '</div><h4 class="element-recommend-title">' + t[item[0]] + '</h4><p class="element-recommend-text">' + t[item[1]] + '</p></article>').join('');
  }
  function applyI18n(){
    const params = getParams();
    const theme = getTheme(params);
    const lang = getLang(params);
    const all = JSON.parse(document.getElementById('i18n-data').textContent);
    const t = all[lang] || all.en;
    document.body.dataset.theme = theme;
    document.documentElement.lang = lang === 'zhHans' ? 'zh-CN' : lang === 'zhHant' ? 'zh-Hant' : lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.title = t.title;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if(t[key]) el.textContent = t[key];
    });
    renderAreas(lang,t);
    renderRecommends(t);
  }
  applyI18n();
</script>
